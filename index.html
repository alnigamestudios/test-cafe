        <div id="menuContent"><h4 class="mt-5 mb-4 fw-bold ps-3 py-1 fade-up" style="border-left:5px solid #2063a7; color:#333">içecekler</h4><div class="row g-3 px-2">
            <div class="col-12 col-md-6 col-lg-4 fade-up" style="animation-delay:0s">

                        <img src="https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510456/jtpq6pdjoseby2d92dwd.png" class="card-img-top" style="height:180px; object-fit:cover" loading="lazy">
                        <div style="position:absolute; top:10px; left:10px"><span class="badge bg-success me-1 shadow-sm" style="font-size:10px">Yeni</span></div>
                    </div>
                    <div class="card-body p-3 w-100 d-flex flex-column justify-content-between">
                        <div onclick="openDetails('kahve', '', '100', 'https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510456/jtpq6pdjoseby2d92dwd.png')" style="cursor:pointer">
                            
                            <h6 class="fw-bold mb-1" style="font-size:1.1rem">kahve</h6>

                        </div>
                    </div>
                </div>
            </div></div><h4 class="mt-5 mb-4 fw-bold ps-3 py-1 fade-up" style="border-left:5px solid #2063a7; color:#333">yiyecekler</h4><div class="row g-3 px-2">
            <div class="col-12 col-md-6 col-lg-4 fade-up" style="animation-delay:0s">
                <div class="card h-100 " style="border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); background:#fff; border: none; overflow:hidden; transition:transform 0.2s" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                    <div style="position:relative; cursor:pointer;" onclick="openDetails('tost', '', '150', 'https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510492/evog1ivge0th0w7prayd.png')">
                        <img src="https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510492/evog1ivge0th0w7prayd.png" class="card-img-top" style="height:180px; object-fit:cover" loading="lazy">
                        <div style="position:absolute; top:10px; left:10px"><span class="badge bg-success me-1 shadow-sm" style="font-size:10px">Yeni</span><span class="badge bg-danger me-1 shadow-sm" style="font-size:10px">Çok Satan</span></div>
                    </div>
                    <div class="card-body p-3 w-100 d-flex flex-column justify-content-between">
                        <div onclick="openDetails('tost', '', '150', 'https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510492/evog1ivge0th0w7prayd.png')" style="cursor:pointer">
                            
                            <h6 class="fw-bold mb-1" style="font-size:1.1rem">tost</h6>
                            <p class="small text-muted mb-2 text-truncate" style="max-height:40px"></p>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
                            <small class="text-decoration-line-through text-muted me-2" style="font-size:0.85rem">200₺</small><span class="fw-bold fs-5" style="color:#2063a7;">150₺</span>
                            <button onclick="addToCart('tost', 150)" class="btn btn-sm rounded-circle text-white shadow" style="background:#2063a7; width:35px; height:35px; font-size:1.2rem; display:flex; align-items:center; justify-content:center; transition:0.2s"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div></div></div>

        <div class="mt-5 pt-5 pb-4 border-top text-center text-muted small fade-up">
            <h5 class="fw-bold mb-3" style="color:#2063a7">test kafe</h5>
            <p class="mb-2"><i class="fas fa-bullhorn text-warning"></i> öğrenciye %50 indirim</p>
            <p class="mb-2"><i class="fas fa-clock"></i> <strong>Çalışma Saatleri:</strong> 9:00 - 21:00</p>
            <p class="mb-2"><i class="fas fa-map-marker-alt"></i> izmir</p>
            <p class="mb-2"><i class="fas fa-phone"></i> 05550060273</p>
            <div class="mt-3"><button onclick="navigator.clipboard.writeText('testkafe2026'); alert('WiFi şifresi kopyalandı!')" class="btn btn-sm btn-outline-dark rounded-pill"><i class="fas fa-wifi"></i> WiFi Kopya: testkafe2026</button></div>
            
            <div class="mt-4">
                <a href="https://instagram.com/testkafe" target="_blank" class="btn btn-light rounded-circle shadow-sm me-2" style="width:40px;height:40px;padding:8px"><i class="fab fa-instagram text-danger fs-5"></i></a>
                <a href="https://wa.me/905550060273?text=Merhaba" target="_blank" class="btn btn-light rounded-circle shadow-sm" style="width:40px;height:40px;padding:8px"><i class="fab fa-whatsapp text-success fs-5"></i></a>
            </div>
        </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div class="modal fade" id="dm" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable p-0">
            <div class="modal-content border-0 overflow-hidden" style="border-radius:24px">
                <button type="button" class="btn-close position-absolute top-0 end-0 m-3 bg-white p-2 shadow" data-bs-dismiss="modal" style="z-index:99"></button>
                <img id="mi" src="" class="modal-img">
                <div class="modal-body p-4">
                    <div class="d-flex justify-content-between align-items-start">
                        <h4 id="mt" class="fw-bold mb-2"></h4>
                        <h4 id="mp" class="fw-bold" style="color:#2063a7"></h4>
                    </div>
                    <p id="md" class="text-muted mb-4" style="line-height:1.6"></p>
                    <button id="mbtn" class="btn text-white w-100 py-3 fw-bold rounded-pill shadow" style="background:#2063a7; font-size:1.1rem">Sepete Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CART MODAL -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable p-0">
            <div class="modal-content border-0 shadow-lg" style="border-radius:24px">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold m-0"><i class="fas fa-shopping-basket text-primary"></i> Sepetim</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="cartItems"></div>
                <div class="modal-footer border-0 pt-0 flex-column">
                    <div class="d-flex justify-content-between w-100 mb-3 border-top pt-3">
                        <span class="fs-5 text-muted">Toplam:</span>
                        <span class="fs-4 fw-bold" style="color:#2063a7" id="cartTotal">0₺</span>
                    </div>
                    <button onclick="sendOrder()" class="btn btn-success w-100 py-3 fw-bold rounded-pill shadow-lg d-flex justify-content-center align-items-center" style="font-size:1.1rem" >
                        <i class="fab fa-whatsapp fs-4 me-2"></i> Siparişi WhatsApp ile Gönder
                    </button>
                    
                </div>
            </div>
        </div>
    </div>

    <!-- FLOATING CART BAR -->
    <div class="cart-bar" id="cartBar" onclick="new bootstrap.Modal(document.getElementById('cartModal')).show()">
        <div>
            <span class="cart-badge" id="cartCount">0</span>
            <span class="fw-bold">Sepeti Gör</span>
        </div>
        <span class="fw-bold fs-5" id="cartBarTotal">0₺</span>
    </div>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = [];
        let priceTarget = 0;
        let pNameTarget = "";

        const m = new bootstrap.Modal(document.getElementById('dm'));
        function openDetails(name, desc, price, img) {
            document.getElementById('mt').innerText = name;
            document.getElementById('md').innerText = desc;
            document.getElementById('mp').innerText = price + '₺';
            priceTarget = parseFloat(price);
            pNameTarget = name;
            const iEl = document.getElementById('mi');
            if(img) { iEl.src=img; iEl.style.display='block'; } else { iEl.style.display='none'; }
            const btn = document.getElementById('mbtn');
            btn.onclick = () => { addToCart(pNameTarget, priceTarget); m.hide(); };
            m.show();
        }

        function addToCart(name, price) {
            const existing = cart.find(x => x.n === name);
            if(existing) existing.q++;
            else cart.push({n: name, p: parseFloat(price), q: 1});
            updateCart();
            // Küçük bir animasyon
            const bar = document.getElementById('cartBar');
            bar.style.transform = 'translate(-50%, -10px) scale(1.05)';
            setTimeout(() => bar.style.transform = 'translateX(-50%)', 200);
        }

        function updateItem(idx, change) {
            cart[idx].q += change;
            if(cart[idx].q <= 0) cart.splice(idx, 1);
            updateCart();
        }

        function updateCart() {
            let total = 0;
            let count = 0;
            let html = "";
            cart.forEach((item, idx) => {
                total += item.p * item.q;
                count += item.q;
                html += `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div><h6 class="m-0 fw-bold">${item.n}</h6><small class="text-muted">${item.p}₺</small></div>
                    <div class="btn-group btn-group-sm shadow-sm">
                        <button onclick="updateItem(${idx}, -1)" class="btn btn-light border">-</button>
                        <button class="btn btn-white border fw-bold" disabled>${item.q}</button>
                        <button onclick="updateItem(${idx}, 1)" class="btn btn-light border">+</button>
                    </div>
                </div>`;
            });
            
            document.getElementById('cartItems').innerHTML = html || '<div class="text-center text-muted my-4"><i class="fas fa-shopping-basket fs-1 mb-3 opacity-25"></i><br>Sepetiniz boş</div>';
            document.getElementById('cartTotal').innerText = total.toFixed(2) + "₺";
            
            const bar = document.getElementById('cartBar');
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartBarTotal').innerText = total.toFixed(2) + "₺";
            
            if(count > 0) bar.classList.add('active');
            else { bar.classList.remove('active'); bootstrap.Modal.getInstance(document.getElementById('cartModal'))?.hide(); }
        }

        function sendOrder() {
            if(cart.length === 0) return;
            const params = new URLSearchParams(window.location.search);
            const table = params.get('masa') || params.get('table') || 'Belirtilmedi';
            
            let text = `👋 Merhaba, sipariş vermek istiyorum:\n\n📌 Masa: ${table}\n\n`;
            let total = 0;
            cart.forEach(i => {
                text += `🔸 ${i.q}x ${i.n} - ${(i.p*i.q).toFixed(2)}₺\n`;
                total += i.p*i.q;
            });
            text += `\n💵 *Toplam: ${total.toFixed(2)}₺*`;
            
            const phone = '905550060273';
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        function search(val) {
            const t = val.toLowerCase();
            document.querySelectorAll('.card').forEach(el => {
                const txt = el.innerText.toLowerCase();
                el.parentElement.style.display = txt.includes(t) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
