<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; padding-bottom: 80px; scroll-behavior: smooth; }
        .modal-img { width: 100%; height: 300px; object-fit: cover; }
        body{background:#f4f7f6}
    </style>
</head>
<body>
    <div style="height:220px; background:url('https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510536/k1k6naz7jhksm3fjithg.png') center/cover; position:relative;">
            <div style="position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);padding:20px;color:white">
                <h2 class="m-0 fw-bold">test kafe</h2>
                <small>özel kahve deneyimi için bekleriz</small>
            </div>
        </div>
    
    <div class="container mt-3">
        <div class="alert alert-warning border-0 shadow-sm text-center fw-bold"><i class="fas fa-bullhorn"></i> öğrenciye %50 indirim</div>
        
        <div class="input-group mb-4 shadow-sm" style="border-radius:20px; overflow:hidden">
            <span class="input-group-text bg-white border-0 ps-3"><i class="fas fa-search text-muted"></i></span>
            <input type="text" class="form-control border-0 py-2" placeholder="Menüde ara..." onkeyup="search(this.value)">
        </div>

        <div id="menuContent"><h5 class="mt-4 mb-3 fw-bold ps-2" style="border-left:4px solid #2063a7; color:#333">içecekler</h5><div class="row g-3">
            <div class="col-12">
                <div class="card h-100 border-0 " style="border-radius:16px; box-shadow:0 10px 20px rgba(0,0,0,0.08); cursor:pointer; overflow:hidden; background:#fff" onclick="openModal('kahve', '', '100', 'https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510456/jtpq6pdjoseby2d92dwd.png', '[]')">
                    <img src="https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510456/jtpq6pdjoseby2d92dwd.png" class="card-img-top" style="height:150px; object-fit:cover">
                    <div class="card-body p-3 w-100 d-flex flex-column justify-content-between">
                        <div>
                            <div class="mb-1"><span class="badge bg-warning text-dark me-1" style="font-size:10px">Yeni</span></div>
                            <h6 class="fw-bold mb-1">kahve</h6>
                            <p class="small text-muted mb-2 text-truncate" style="max-height:40px"></p>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <small class="text-decoration-line-through text-muted me-2">150</small><span class="fw-bold" style="color:#2063a7; font-size:1.1rem">100₺</span>
                            <button class="btn btn-sm rounded-circle text-white shadow-sm" style="background:#2063a7; width:30px; height:30px; padding:0">+</button>
                        </div>
                    </div>
                </div>
            </div></div><h5 class="mt-4 mb-3 fw-bold ps-2" style="border-left:4px solid #2063a7; color:#333">yiyecekler</h5><div class="row g-3">
            <div class="col-12">
                <div class="card h-100 border-0 " style="border-radius:16px; box-shadow:0 10px 20px rgba(0,0,0,0.08); cursor:pointer; overflow:hidden; background:#fff" onclick="openModal('tost', '', '150', 'https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510492/evog1ivge0th0w7prayd.png', '[]')">
                    <img src="https://res.cloudinary.com/dbwqidxpy/image/upload/v1775510492/evog1ivge0th0w7prayd.png" class="card-img-top" style="height:150px; object-fit:cover">
                    <div class="card-body p-3 w-100 d-flex flex-column justify-content-between">
                        <div>
                            <div class="mb-1"><span class="badge bg-warning text-dark me-1" style="font-size:10px">Yeni</span><span class="badge bg-warning text-dark me-1" style="font-size:10px">Çok Satan</span></div>
                            <h6 class="fw-bold mb-1">tost</h6>
                            <p class="small text-muted mb-2 text-truncate" style="max-height:40px"></p>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <small class="text-decoration-line-through text-muted me-2">200</small><span class="fw-bold" style="color:#2063a7; font-size:1.1rem">150₺</span>
                            <button class="btn btn-sm rounded-circle text-white shadow-sm" style="background:#2063a7; width:30px; height:30px; padding:0">+</button>
                        </div>
                    </div>
                </div>
            </div></div></div>

        <div class="mt-5 pt-4 border-top text-center text-muted small">
            <h6 class="fw-bold">test kafe</h6>
            <p class="mb-1"><i class="fas fa-map-marker-alt"></i> izmir</p>
            <p><i class="fas fa-phone"></i> 05550060273</p>
            <a href="https://instagram.com/testkafe" class="btn btn-outline-dark btn-sm rounded-pill mt-2"><i class="fab fa-instagram"></i> Takip Et</a>
        </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div class="modal fade" id="dm" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable p-0">
            <div class="modal-content border-0 overflow-hidden" style="border-radius:20px">
                <button type="button" class="btn-close position-absolute top-0 end-0 m-3 bg-white p-2 shadow" data-bs-dismiss="modal" style="z-index:99"></button>
                <img id="mi" src="" class="modal-img">
                <div class="modal-body p-4">
                    <div class="d-flex justify-content-between align-items-start">
                        <h3 id="mt" class="fw-bold mb-2"></h3>
                        <h3 id="mp" class="fw-bold text-primary"></h3>
                    </div>
                    <p id="md" class="text-muted mb-3"></p>
                    <button class="btn btn-dark w-100 py-3 fw-bold rounded-pill shadow-lg mt-2" style="background:#2063a7; border:none">Siparişi Tamamla</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const m = new bootstrap.Modal(document.getElementById('dm'));
        function openModal(name, desc, price, img, variantsJson) {
            document.getElementById('mt').innerText = name;
            document.getElementById('md').innerText = desc;
            document.getElementById('mp').innerText = price + '₺';
            const iEl = document.getElementById('mi');
            if(img) { iEl.src=img; iEl.style.display='block'; } else { iEl.style.display='none'; }
            m.show();
        }
        function search(val) {
            const t = val.toLowerCase();
            document.querySelectorAll('.card').forEach(el => {
                const txt = el.innerText.toLowerCase();
                el.parentElement.style.display = txt.includes(t) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
